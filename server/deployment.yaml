apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    run: dealership
  name: dealership
spec:
  replicas: 1
  selector:
    matchLabels:
      run: dealership
  strategy:
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 25%
    type: RollingUpdate
  template:
    metadata:
      labels:
        run: dealership
    spec:
      containers:
      - image: us.icr.io/sn-labs-nellimotavva/dealership:latest
        imagePullPolicy: Always
        name: dealership
        env:
        - name: backend_url
          value: "http://database-service:3030" # Placeholder - user will need to confirm/update
        - name: sentiment_analyzer_url
          value: "https://sn-labs-nellimotavva.us-south.codeengine.appdomain.cloud/"
        ports:
        - containerPort: 8000
          protocol: TCP
      restartPolicy: Always
