name: CI — Lint & Test

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  # ---------------------------------------------------------------------------
  # Python linting
  # ---------------------------------------------------------------------------
  lint_python:
    name: Lint Python
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install flake8
        run: pip install flake8

      - name: Run flake8
        run: |
          flake8 . --exclude=node_modules,djangoenv,venv,server/frontend/node_modules,migrations
          echo "Python linting passed"

  # ---------------------------------------------------------------------------
  # JavaScript linting
  # ---------------------------------------------------------------------------
  lint_js:
    name: Lint JavaScript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install jshint
        run: npm install -g jshint

      - name: Run jshint
        run: |
          find ./server/database -name "*.js" -exec jshint {} +
          echo "JavaScript linting passed"

  # ---------------------------------------------------------------------------
  # Django unit tests
  # ---------------------------------------------------------------------------
  test_django:
    name: Django Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Django tests
        env:
          DJANGO_SECRET_KEY: ci-test-secret-key-not-for-production
          DJANGO_DEBUG: 'True'
          backend_url: http://localhost:3030
          sentiment_analyzer_url: http://localhost:5050/
        run: python manage.py test djangoapp --verbosity=2

  # ---------------------------------------------------------------------------
  # Flask microservice unit tests
  # ---------------------------------------------------------------------------
  test_flask:
    name: Flask Sentiment Service Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server/djangoapp/microservices

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install flask nltk pytest

      - name: Download NLTK data
        run: python -c "import nltk; nltk.download('vader_lexicon')"

      - name: Run pytest
        run: pytest test_app.py -v
